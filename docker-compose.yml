services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: dhan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dhan_trading
      POSTGRES_USER: dhan_user
      POSTGRES_PASSWORD: dhan_password
    ports:
      - "5432:5432"
    volumes:
      - dhan_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dhan_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dhan_redis_data:/data

volumes:
  dhan_postgres_data:
  dhan_redis_data: